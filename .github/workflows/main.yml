name: Deploy Application

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'templates/**'
      - 'static/**'
      - 'kb/**'
      - 'CLAUDE.md'
      - '.github/workflows/main.yml'
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: europe-west2-docker.pkg.dev/obelisk-stamps/obelisk-stamps/obelisk-stamps:${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment variables
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Verify Secrets (Debugging)
        run: |
          echo "Checking if secrets are set..."
          echo "DB_PASSWORD is set? " $(if [ -z "$DB_PASSWORD" ]; then echo "NO"; else echo "YES"; fi)
          echo "MAIL_PASSWORD is set? " $(if [ -z "$MAIL_PASSWORD" ]; then echo "NO"; else echo "YES"; fi)
          
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v0.2.0
        with:
            project_id: obelisk-stamps
            service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
            service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Authenticate Docker with Artifact Registry
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev
  
      - name: Debug - List ML files before build
        run: |
            echo "=== Checking models/ folder ==="
            ls -la models/ || echo "models/ folder not found"
            echo "=== Checking indexes/ folder ==="
            ls -la indexes/ || echo "indexes/ folder not found"

      - name: Build the container image
        run: |
            docker build -t "$IMAGE" .
  
      - name: Push the container image
        run: |
            docker push "$IMAGE"
  
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy obelisk-stamps \
            --image "$IMAGE" \
            --platform managed \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 1 \
            --set-env-vars "DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},DB_NAME=${{ secrets.DB_NAME }},MAIL_USERNAME=${{ secrets.MAIL_USERNAME }},MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},ML_API_URL=https://obelisk-stamps-ml-api-131949439215.europe-west1.run.app,STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }},STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }},STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},SITE_URL=https://obelisk-stamps.com,OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GCS_BUCKET_NAME=obelisk-stamps-assets,IG_USER_ID=${{ secrets.IG_USER_ID }},IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }},LUMAAI_API_KEY=${{ secrets.LUMAAI_API_KEY }},FB_PAGE_ID=${{ secrets.FB_PAGE_ID }},FB_PAGE_ACCESS_TOKEN=${{ secrets.FB_PAGE_ACCESS_TOKEN }},X_API_KEY=${{ secrets.X_API_KEY }},X_API_SECRET=${{ secrets.X_API_SECRET }},X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }},X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }},THREADS_USER_ID=${{ secrets.THREADS_USER_ID }},THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }},PINTEREST_ACCESS_TOKEN=${{ secrets.PINTEREST_ACCESS_TOKEN }},PINTEREST_BOARD_ID=${{ secrets.PINTEREST_BOARD_ID }},TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }},TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }},TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }},LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }},LINKEDIN_ORG_ID=${{ secrets.LINKEDIN_ORG_ID }},BLUESKY_HANDLE=${{ secrets.BLUESKY_HANDLE }},BLUESKY_APP_PASSWORD=${{ secrets.BLUESKY_APP_PASSWORD }},REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }},REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }},REDDIT_REFRESH_TOKEN=${{ secrets.REDDIT_REFRESH_TOKEN }},REDDIT_SUBREDDIT=${{ secrets.REDDIT_SUBREDDIT }},TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},VIMEO_ACCESS_TOKEN=${{ secrets.VIMEO_ACCESS_TOKEN }},MASTODON_INSTANCE_URL=${{ secrets.MASTODON_INSTANCE_URL }},MASTODON_ACCESS_TOKEN=${{ secrets.MASTODON_ACCESS_TOKEN }},VK_ACCESS_TOKEN=${{ secrets.VK_ACCESS_TOKEN }},VK_OWNER_ID=${{ secrets.VK_OWNER_ID }},TUMBLR_ACCESS_TOKEN=${{ secrets.TUMBLR_ACCESS_TOKEN }},TUMBLR_BLOG_NAME=${{ secrets.TUMBLR_BLOG_NAME }}"

      # Old Jan26
      #- name: Deploy to Cloud Run
      #  run: |
      #      gcloud run deploy obelisk-stamps \
      #        --image europe-west2-docker.pkg.dev/obelisk-stamps/cloud-run-source-deploy/obelisk-stamps:latest \
      #        --platform managed \
      #        --region europe-west2 \
      #        --set-env-vars DB_PASSWORD=${{ secrets.DB_PASSWORD }},MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}      

      - name: Cleanup orphan processes
        run: |
          echo "Cleaning up orphan processes..."
          git submodule foreach --recursive 'git config --local --unset-all "http.https://github.com" || :'
