<!-- Floating AI Chatbot Widget -->
<div class="chatbot-container" id="chatbot-container">

    <!-- Toggle: circle button + curved arc text -->
    <div class="chatbot-toggle-wrapper" id="chatbot-toggle">
        <!-- Curved text arc -->
        <svg class="chatbot-arc-label" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <path id="chatbot-arc-path" d="M 10,60 A 50,50 0 0,1 110,60" fill="none"/>
            </defs>
            <text>
                <textPath href="#chatbot-arc-path" startOffset="50%" text-anchor="middle">
                    Stamps Expert AI
                </textPath>
            </text>
        </svg>
        <!-- Circle button -->
        <button class="chatbot-toggle" title="Chat with our Stamp Expert">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                <path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/>
                <path d="M3 3.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 6a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 6zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
            </svg>
        </button>
    </div>

    <!-- Chat panel (hidden by default) -->
    <div class="chatbot-panel" id="chatbot-panel" style="display: none;">
        <div class="card">
            <div class="card-header bg-dark text-white d-flex align-items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                     class="me-2" viewBox="0 0 16 16">
                    <path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/>
                    <path d="M3 3.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zM3 6a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 6zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
                </svg>
                <span class="fw-semibold me-auto">Stamp Expert</span>
                <span class="badge bg-success me-2">AI</span>
                <button class="btn btn-sm btn-link text-white p-0" id="chatbot-close" title="Close chat"
                        style="font-size: 1.3rem; line-height: 1; text-decoration: none;">
                    &times;
                </button>
            </div>

            <div class="card-body p-0">
                <!-- Messages area -->
                <div class="chatbot-messages" id="chatbot-messages">
                    <!-- Welcome message -->
                    <div class="chatbot-msg chatbot-msg-assistant">
                        <div class="chatbot-bubble">
                            Hello! I'm the Obelisk Stamps assistant. Ask me anything about stamps,
                            philately, collecting tips, or our framed stamp displays. How can I help?
                        </div>
                    </div>
                </div>

                <!-- Input area -->
                <div class="chatbot-input-area">
                    <form id="chatbot-form" class="d-flex gap-2" style="max-width: none;">
                        <input type="text" class="form-control form-control-sm" id="chatbot-input"
                               placeholder="Ask about stamps, collecting, values..."
                               maxlength="500" autocomplete="off">
                        <button type="submit" class="btn btn-primary btn-sm px-3" id="chatbot-send"
                                title="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                 fill="currentColor" viewBox="0 0 16 16">
                                <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.5.5 0 0 1-.928-.067l-2.185-6.114-6.114-2.185a.5.5 0 0 1-.067-.928L15.314.036a.5.5 0 0 1 .54.11z"/>
                            </svg>
                        </button>
                    </form>
                    <div class="d-flex justify-content-between align-items-center mt-1 px-1">
                        <small class="text-muted" id="chatbot-char-count">0/500</small>
                        <small class="text-muted">Powered by OpenAI</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
